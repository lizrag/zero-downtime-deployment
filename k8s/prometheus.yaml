apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - "/etc/prometheus/alerts.yaml"

    scrape_configs:
      - job_name: "auth-service"
        static_configs:
          - targets: ["auth-service:80"]
        metrics_path: "/metrics"

  alerts.yaml: |
    groups:
      - name: auth-service-slos
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(http_requests_total{job="auth-service", status=~"5xx"}[2m]))
              /
              sum(rate(http_requests_total{job="auth-service"}[2m])) > 0.005
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Success rate dropped below 99.5%"
              description: "Error rate is {{ $value | humanizePercentage }} over the last 2 minutes."

          - alert: HighLatencyP99
            expr: |
              histogram_quantile(0.99,
                sum(rate(http_request_duration_seconds_bucket{job="auth-service"}[2m])) by (le)
              ) > 2.0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "P99 latency above 2 seconds"
              description: "P99 latency is {{ $value }}s over the last 2 minutes"

          - alert: LowThroughput
            expr: |
              sum(rate(http_requests_total{job="auth-service"}[2m])) < 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Throughput too low"
              description: "Less than 1 request/sec over the last 2 minutes"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090